<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin · Invitaciones</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#0d0d0f;
    --panel:#161618;
    --panel-2:#1e1e21;
    --border:#2c2c30;
    --text:#f2f2f0;
    --muted:#9a9a9f;
    --amber:#F5A623;
    --amber-dim:#3a2c10;
    --danger:#e5484d;
    --ok:#2fb872;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:560px;margin:0 auto;padding:24px 18px 80px;}
  header.topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 18px;border-bottom:1px solid var(--border);
    position:sticky;top:0;background:rgba(13,13,15,.92);backdrop-filter:blur(8px);z-index:10;
  }
  header.topbar h1{font-size:15px;font-weight:600;letter-spacing:.02em;margin:0;color:var(--amber);}
  header.topbar button{
    background:none;border:1px solid var(--border);color:var(--muted);
    padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;
  }
  h2{font-size:20px;margin:28px 0 4px;font-weight:600;}
  p.sub{color:var(--muted);font-size:13px;margin:0 0 20px;}
  label{display:block;font-size:12px;color:var(--muted);margin:16px 0 6px;text-transform:uppercase;letter-spacing:.04em;}
  input[type=text],input[type=email],input[type=password],input[type=date],input[type=time],input[type=url],textarea,select{
    width:100%;padding:12px 14px;background:var(--panel-2);border:1px solid var(--border);
    border-radius:10px;color:var(--text);font-size:15px;outline:none;
  }
  input:focus,textarea:focus,select:focus{border-color:var(--amber);}
  textarea{resize:vertical;min-height:70px;font-family:inherit;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .check{display:flex;align-items:center;gap:8px;margin-top:16px;}
  .check input{width:18px;height:18px;}
  .check label{margin:0;text-transform:none;font-size:14px;color:var(--text);}
  button.primary{
    width:100%;padding:14px;margin-top:24px;background:var(--amber);color:#181108;
    border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;
  }
  button.primary:disabled{opacity:.5;}
  button.secondary{
    width:100%;padding:12px;margin-top:10px;background:none;color:var(--muted);
    border:1px solid var(--border);border-radius:10px;font-size:14px;cursor:pointer;
  }
  .card{
    background:var(--panel);border:1px solid var(--border);border-radius:14px;
    padding:16px;margin-top:14px;
  }
  .card h3{margin:0 0 4px;font-size:16px;}
  .card .meta{color:var(--muted);font-size:12px;margin-bottom:10px;}
  .tag{
    display:inline-block;background:var(--amber-dim);color:var(--amber);
    font-size:11px;padding:2px 8px;border-radius:20px;margin-right:6px;
  }
  .linkbox{
    display:flex;align-items:center;gap:8px;background:var(--panel-2);
    border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-top:8px;
  }
  .linkbox span{flex:1;font-size:13px;color:var(--amber);word-break:break-all;}
  .linkbox button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;}
  .tabs{display:flex;gap:8px;margin:20px 0;border-bottom:1px solid var(--border);}
  .tabs button{
    flex:1;background:none;border:none;color:var(--muted);padding:10px 0;
    font-size:14px;cursor:pointer;border-bottom:2px solid transparent;
  }
  .tabs button.active{color:var(--amber);border-color:var(--amber);}
  .guest-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
  .guest-row:last-child{border-bottom:none;}
  .guest-info{flex:1;}
  .guest-info b{font-size:14px;}
  .guest-info .meta{font-size:12px;color:var(--muted);}
  .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .status-dot.si{background:var(--ok);}
  .status-dot.no{background:var(--danger);}
  .status-dot.pend{background:var(--muted);}
  .err{color:var(--danger);font-size:13px;margin-top:10px;}
  .ok-msg{color:var(--ok);font-size:13px;margin-top:10px;}
  .hidden{display:none !important;}
  .back{color:var(--muted);font-size:13px;background:none;border:none;cursor:pointer;padding:0;margin-bottom:10px;}
  .photo-preview{width:100%;height:160px;border-radius:10px;object-fit:cover;margin-top:10px;border:1px solid var(--border);}
  .spinner{width:16px;height:16px;border:2px solid rgba(0,0,0,.2);border-top-color:#181108;border-radius:50%;display:inline-block;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="loginView" class="wrap">
  <h2 style="margin-top:60px;">Panel de Invitaciones</h2>
  <p class="sub">Ingresa con tu cuenta de administrador.</p>
  <label>Email</label>
  <input type="email" id="loginEmail" autocomplete="email">
  <label>Contraseña</label>
  <input type="password" id="loginPass" autocomplete="current-password">
  <button class="primary" id="loginBtn" onclick="doLogin()">Ingresar</button>
  <div id="loginErr" class="err"></div>
</div>

<!-- ===== APP ===== -->
<div id="appView" class="hidden">
  <header class="topbar">
    <h1>♡ INVITACIONES</h1>
    <button onclick="doLogout()">Salir</button>
  </header>

  <div class="wrap">

    <!-- LISTA DE EVENTOS -->
    <div id="listView">
      <h2>Tus eventos</h2>
      <p class="sub">Crea una invitación o gestiona una existente.</p>
      <button class="primary" onclick="showCreate()">+ Nueva invitación</button>
      <div id="eventList"></div>
    </div>

    <!-- CREAR EVENTO -->
    <div id="createView" class="hidden">
      <button class="back" onclick="showList()">← Volver</button>
      <h2>Nueva invitación</h2>
      <p class="sub">Completa los datos del evento.</p>

      <label>Tipo de evento</label>
      <select id="f_tipo">
        <option value="boda">Boda — Eternal</option>
        <option value="xv">XV Años — Quinceañera Glam</option>
        <option value="cumple">Cumpleaños — Fiesta</option>
        <option value="babyshower">Baby Shower — Ternura</option>
      </select>

      <label>Nombre(s) del homenajeado/a</label>
      <input type="text" id="f_nombres" placeholder="Ej: Luis Miguel &amp; Aracely">

      <label>Enlace personalizado (slug)</label>
      <input type="text" id="f_slug" placeholder="luis-aracely">

      <div class="row2">
        <div>
          <label>Fecha del evento</label>
          <input type="date" id="f_fecha">
        </div>
        <div>
          <label>Hora principal</label>
          <input type="time" id="f_hora">
        </div>
      </div>

      <label>Mensaje / versículo</label>
      <textarea id="f_mensaje" placeholder="Así que no son ya más dos sino una sola carne..."></textarea>

      <h3 style="margin-top:30px;color:#F5A623;font-size:15px;">💒 Ceremonia</h3>
      <label>Lugar (ej: Catedral de San Sebastián)</label>
      <input type="text" id="f_lugar_ceremonia" placeholder="Catedral de San Sebastián">
      <label>Hora</label>
      <input type="time" id="f_hora_ceremonia">
      <label>Dirección</label>
      <input type="text" id="f_direccion_ceremonia" placeholder="Calle Aniceto Arze esq. Plaza 14 de Septiembre">
      <label>Link de Google Maps</label>
      <input type="url" id="f_mapa_ceremonia" placeholder="https://maps.app.goo.gl/...">

      <h3 style="margin-top:30px;color:#F5A623;font-size:15px;">🥂 Recepción</h3>
      <label>Lugar (ej: Salón de Eventos)</label>
      <input type="text" id="f_lugar" placeholder="Salón de Eventos">
      <label>Hora</label>
      <input type="time" id="f_hora_recepcion">
      <label>Dirección</label>
      <input type="text" id="f_direccion_recepcion" placeholder="Avenida Santa Cruz">
      <label>Link de Google Maps</label>
      <input type="url" id="f_mapa" placeholder="https://maps.app.goo.gl/...">

      <h3 style="margin-top:30px;color:#F5A623;font-size:15px;">👨‍👩‍👧 Padres</h3>
      <div class="row2">
        <div><label>Padre del novio</label><input type="text" id="f_padre_novio"></div>
        <div><label>Madre del novio</label><input type="text" id="f_madre_novio"></div>
      </div>
      <div class="row2">
        <div><label>Padre de la novia</label><input type="text" id="f_padre_novia"></div>
        <div><label>Madre de la novia</label><input type="text" id="f_madre_novia"></div>
      </div>

      <h3 style="margin-top:30px;color:#F5A623;font-size:15px;">🕐 Protocolo</h3>
      <label>Un evento por línea, formato: Hora - Actividad</label>
      <textarea id="f_protocolo" placeholder="18:30 - Ceremonia Religiosa&#10;20:00 - Recepción Social&#10;20:30 - Vals y Brindis&#10;21:30 - Cena&#10;22:00 - A Bailar&#10;03:00 - Fin de la Fiesta"></textarea>

      <h3 style="margin-top:30px;color:#F5A623;font-size:15px;">👗 Detalles finales</h3>
      <label>Código de vestimenta (opcional)</label>
      <input type="text" id="f_vestimenta" placeholder="Formal, casual elegante...">

      <div class="check">
        <input type="checkbox" id="f_adultos">
        <label for="f_adultos">Evento solo para adultos</label>
      </div>

      <label>Color principal</label>
      <input type="text" id="f_color" value="#F5A623">

      <label>Foto principal (portada)</label>
      <input type="file" id="f_foto" accept="image/*">
      <img id="fotoPreview" class="photo-preview hidden">

      <label>Galería de fotos (elige varias)</label>
      <input type="file" id="f_galeria" accept="image/*" multiple>

      <button class="primary" id="createBtn" onclick="crearEvento()">Crear invitación</button>
      <div id="createErr" class="err"></div>
      <div id="createOk" class="ok-msg hidden"></div>
    </div>

    <!-- DETALLE / INVITADOS -->
    <div id="detailView" class="hidden">
      <button class="back" onclick="showList()">← Volver</button>
      <h2 id="d_titulo">Evento</h2>
      <div class="linkbox">
        <span id="d_link"></span>
        <button onclick="copyLink()">Copiar</button>
      </div>

      <div class="tabs">
        <button id="tabInvitados" class="active" onclick="switchTab('invitados')">Invitados</button>
        <button id="tabAgregar" onclick="switchTab('agregar')">Agregar</button>
      </div>

      <div id="paneInvitados">
        <div id="guestList"></div>
      </div>

      <div id="paneAgregar" class="hidden">
        <label>Nombre del invitado</label>
        <input type="text" id="g_nombre" placeholder="William Peredo">
        <label>Número de pases</label>
        <input type="text" id="g_pases" value="2">
        <button class="primary" onclick="agregarInvitado()">Agregar invitado</button>
        <div id="guestErr" class="err"></div>
      </div>
    </div>

  </div>
</div>

<script>
// ===================== CONFIG =====================
const SUPABASE_URL = "https://gdkgacqfvwsyhfjrkxbq.supabase.co";
const SUPABASE_KEY = "sb_publishable_85wL-cG5IUEtHadIXRvfEQ_hNksKI9Q";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const BUCKET = "invitaciones";
// ====================================================

let currentEvent = null;

// ---------- INIT ----------
window.addEventListener("DOMContentLoaded", async () => {
  const { data } = await sb.auth.getSession();
  if (data.session) {
    showApp();
    loadEvents();
  }
});

// ---------- AUTH ----------
async function doLogin(){
  const email = document.getElementById("loginEmail").value.trim();
  const pass = document.getElementById("loginPass").value;
  const errBox = document.getElementById("loginErr");
  const btn = document.getElementById("loginBtn");
  errBox.textContent = "";
  if(!email || !pass){ errBox.textContent = "Completa email y contraseña."; return; }
  btn.disabled = true; btn.textContent = "Ingresando...";
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  btn.disabled = false; btn.textContent = "Ingresar";
  if (error){ errBox.textContent = "Credenciales incorrectas."; return; }
  showApp();
  loadEvents();
}

async function doLogout(){
  await sb.auth.signOut();
  document.getElementById("appView").classList.add("hidden");
  document.getElementById("loginView").classList.remove("hidden");
}

function showApp(){
  document.getElementById("loginView").classList.add("hidden");
  document.getElementById("appView").classList.remove("hidden");
}

// ---------- NAVIGATION ----------
function showList(){
  document.getElementById("listView").classList.remove("hidden");
  document.getElementById("createView").classList.add("hidden");
  document.getElementById("detailView").classList.add("hidden");
  loadEvents();
}
function showCreate(){
  document.getElementById("listView").classList.add("hidden");
  document.getElementById("createView").classList.remove("hidden");
  document.getElementById("detailView").classList.add("hidden");
}
function showDetail(){
  document.getElementById("listView").classList.add("hidden");
  document.getElementById("createView").classList.add("hidden");
  document.getElementById("detailView").classList.remove("hidden");
}

// ---------- SLUG AUTO ----------
document.getElementById("f_nombres").addEventListener("input", (e) => {
  const slugField = document.getElementById("f_slug");
  if (!slugField.dataset.touched){
    slugField.value = slugify(e.target.value);
  }
});
document.getElementById("f_slug").addEventListener("input", (e) => {
  e.target.dataset.touched = "1";
});
function slugify(str){
  return str.toString().toLowerCase().trim()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/&/g,"y")
    .replace(/[^a-z0-9]+/g,"-")
    .replace(/(^-|-$)/g,"");
}

document.getElementById("f_foto").addEventListener("change", (e) => {
  const file = e.target.files[0];
  const prev = document.getElementById("fotoPreview");
  if (file){
    prev.src = URL.createObjectURL(file);
    prev.classList.remove("hidden");
  }
});

// ---------- CREAR EVENTO ----------
async function crearEvento(){
  const errBox = document.getElementById("createErr");
  const okBox = document.getElementById("createOk");
  const btn = document.getElementById("createBtn");
  errBox.textContent = ""; okBox.classList.add("hidden");

  const tipo = document.getElementById("f_tipo").value;
  const plantillas = {boda:"eternal", xv:"quinceañera-glam", cumple:"fiesta", babyshower:"ternura"};
  const nombres = document.getElementById("f_nombres").value.trim();
  const slug = document.getElementById("f_slug").value.trim();
  const fecha = document.getElementById("f_fecha").value;
  const hora = document.getElementById("f_hora").value;
  const mensaje = document.getElementById("f_mensaje").value.trim();
  const vestimenta = document.getElementById("f_vestimenta").value.trim();
  const adultos = document.getElementById("f_adultos").checked;
  const color = document.getElementById("f_color").value.trim() || "#F5A623";
  const fotoFile = document.getElementById("f_foto").files[0];
  const galeriaFiles = Array.from(document.getElementById("f_galeria").files || []);

  const lugarCeremonia = document.getElementById("f_lugar_ceremonia").value.trim();
  const horaCeremonia = document.getElementById("f_hora_ceremonia").value;
  const direccionCeremonia = document.getElementById("f_direccion_ceremonia").value.trim();
  const mapaCeremonia = document.getElementById("f_mapa_ceremonia").value.trim();

  const lugar = document.getElementById("f_lugar").value.trim();
  const horaRecepcion = document.getElementById("f_hora_recepcion").value;
  const direccionRecepcion = document.getElementById("f_direccion_recepcion").value.trim();
  const mapa = document.getElementById("f_mapa").value.trim();

  const padreNovio = document.getElementById("f_padre_novio").value.trim();
  const madreNovio = document.getElementById("f_madre_novio").value.trim();
  const padreNovia = document.getElementById("f_padre_novia").value.trim();
  const madreNovia = document.getElementById("f_madre_novia").value.trim();

  const protocoloTexto = document.getElementById("f_protocolo").value.trim();
  const protocolo = protocoloTexto
    ? protocoloTexto.split("\n").map(l => l.trim()).filter(Boolean).map(linea => {
        const [h, ...resto] = linea.split(" - ");
        return { hora: h.trim(), texto: resto.join(" - ").trim() };
      })
    : [];

  if (!nombres || !slug || !fecha){
    errBox.textContent = "Nombre, enlace y fecha son obligatorios.";
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Creando...';

  try{
    let fotoUrl = null;
    if (fotoFile){
      const ext = fotoFile.name.split(".").pop();
      const path = `${slug}/hero-${Date.now()}.${ext}`;
      const { error: upErr } = await sb.storage.from(BUCKET).upload(path, fotoFile, { upsert: true });
      if (upErr) throw upErr;
      const { data: pub } = sb.storage.from(BUCKET).getPublicUrl(path);
      fotoUrl = pub.publicUrl;
    }

    const galeriaUrls = [];
    for (const file of galeriaFiles){
      const ext = file.name.split(".").pop();
      const path = `${slug}/galeria-${Date.now()}-${Math.random().toString(36).slice(2,7)}.${ext}`;
      const { error: upErr } = await sb.storage.from(BUCKET).upload(path, file, { upsert: true });
      if (upErr) throw upErr;
      const { data: pub } = sb.storage.from(BUCKET).getPublicUrl(path);
      galeriaUrls.push(pub.publicUrl);
    }

    const { data, error } = await sb.from("eventos").insert({
      slug,
      tipo,
      plantilla: plantillas[tipo],
      nombres,
      fecha_evento: hora ? `${fecha}T${hora}:00` : `${fecha}T00:00:00`,
      lugar_ceremonia: lugarCeremonia || null,
      hora_ceremonia: horaCeremonia || null,
      direccion_ceremonia: direccionCeremonia || null,
      mapa_ceremonia_url: mapaCeremonia || null,
      lugar_recepcion: lugar || null,
      hora_recepcion: horaRecepcion || null,
      direccion_recepcion: direccionRecepcion || null,
      mapa_recepcion_url: mapa || null,
      mensaje: mensaje || null,
      codigo_vestimenta: vestimenta || null,
      solo_adultos: adultos,
      color_primario: color,
      foto_hero: fotoUrl,
      fotos_galeria: galeriaUrls.length ? galeriaUrls : null,
      detalles: {
        padre_novio: padreNovio || null,
        madre_novio: madreNovio || null,
        padre_novia: padreNovia || null,
        madre_novia: madreNovia || null,
        protocolo
      }
    }).select().single();

    if (error) throw error;

    okBox.textContent = "¡Invitación creada! Redirigiendo...";
    okBox.classList.remove("hidden");
    setTimeout(() => openEvent(data), 900);

  } catch(err){
    console.error(err);
    if (err.code === "23505"){
      errBox.textContent = "Ese enlace ya existe, elige otro.";
    } else {
      errBox.textContent = "Error al crear: " + (err.message || "intenta de nuevo.");
    }
  } finally {
    btn.disabled = false;
    btn.textContent = "Crear invitación";
  }
}

// ---------- LISTAR EVENTOS ----------
async function loadEvents(){
  const box = document.getElementById("eventList");
  box.innerHTML = '<p class="sub">Cargando...</p>';
  const { data, error } = await sb.from("eventos").select("*").order("created_at", { ascending:false });
  if (error){ box.innerHTML = '<p class="err">No se pudo cargar.</p>'; return; }
  if (!data.length){ box.innerHTML = '<p class="sub">Aún no tienes invitaciones creadas.</p>'; return; }

  const nombresTipo = {boda:"Boda", xv:"XV Años", cumple:"Cumpleaños", babyshower:"Baby Shower"};
  box.innerHTML = data.map(ev => `
    <div class="card" onclick='openEvent(${JSON.stringify(ev).replace(/'/g,"&apos;")})'>
      <span class="tag">${nombresTipo[ev.tipo] || ev.tipo}</span>
      <h3>${ev.nombres}</h3>
      <div class="meta">/${ev.slug} · ${formatFecha(ev.fecha_evento)}</div>
    </div>
  `).join("");
}

function formatFecha(iso){
  if (!iso) return "";
  const d = new Date(iso);
  return d.toLocaleDateString("es-BO", { day:"numeric", month:"long", year:"numeric" });
}

// ---------- DETALLE EVENTO ----------
const CARPETA_TIPO = { boda:"boda", xv:"xv", cumple:"cumple", babyshower:"babyshower" };

function openEvent(ev){
  currentEvent = ev;
  document.getElementById("d_titulo").textContent = ev.nombres;
  const carpeta = CARPETA_TIPO[ev.tipo] || "invitacion";
  const url = `${location.origin}${location.pathname.replace('index.html','')}${carpeta}/${ev.slug}`;
  document.getElementById("d_link").textContent = url;
  showDetail();
  switchTab("invitados");
  loadGuests();
}

function copyLink(){
  const text = document.getElementById("d_link").textContent;
  navigator.clipboard.writeText(text).then(() => {
    alert("Link copiado ✔");
  });
}

function switchTab(tab){
  document.getElementById("tabInvitados").classList.toggle("active", tab === "invitados");
  document.getElementById("tabAgregar").classList.toggle("active", tab === "agregar");
  document.getElementById("paneInvitados").classList.toggle("hidden", tab !== "invitados");
  document.getElementById("paneAgregar").classList.toggle("hidden", tab !== "agregar");
}

// ---------- INVITADOS ----------
async function loadGuests(){
  const box = document.getElementById("guestList");
  box.innerHTML = '<p class="sub">Cargando...</p>';
  const { data, error } = await sb.from("invitados")
    .select("*")
    .eq("evento_id", currentEvent.id)
    .order("created_at", { ascending:false });
  if (error){ box.innerHTML = '<p class="err">No se pudo cargar.</p>'; return; }
  if (!data.length){ box.innerHTML = '<p class="sub">Sin invitados aún. Agrega el primero.</p>'; return; }

  box.innerHTML = data.map(g => {
    const cls = g.confirmado === true ? "si" : g.confirmado === false ? "no" : "pend";
    const txt = g.confirmado === true ? "Confirmó" : g.confirmado === false ? "No asistirá" : "Sin responder";
    return `
      <div class="guest-row">
        <span class="status-dot ${cls}"></span>
        <div class="guest-info">
          <b>${g.nombre}</b>
          <div class="meta">${g.pases} pase(s) · ${txt}</div>
        </div>
      </div>`;
  }).join("");
}

async function agregarInvitado(){
  const nombre = document.getElementById("g_nombre").value.trim();
  const pases = parseInt(document.getElementById("g_pases").value) || 1;
  const errBox = document.getElementById("guestErr");
  errBox.textContent = "";
  if (!nombre){ errBox.textContent = "Escribe el nombre del invitado."; return; }

  const { error } = await sb.from("invitados").insert({
    evento_id: currentEvent.id,
    nombre,
    pases
  });
  if (error){ errBox.textContent = "Error al agregar."; return; }

  document.getElementById("g_nombre").value = "";
  document.getElementById("g_pases").value = "2";
  switchTab("invitados");
  loadGuests();
}
</script>
</body>
